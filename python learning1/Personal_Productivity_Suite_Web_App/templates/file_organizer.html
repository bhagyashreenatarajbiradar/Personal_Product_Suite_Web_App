<!DOCTYPE html>

<html>

<head>

<title>
File Organizer
</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>

<h1>
FILE ORGANIZER
</h1>


<form method="POST">


<input
type="text"
name="folder"
placeholder="Enter folder path"
required>


<br>


<button type="submit">
Organize Files
</button>


</form>


{% if message %}

<h2>
{{ message }}
</h2>

{% endif %}


<a href="/">
<button type="button">
Back to Home
</button>
</a>


</body>

</html>

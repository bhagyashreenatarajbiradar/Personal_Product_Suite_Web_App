<!DOCTYPE html>

<html>

<head>

    <title>Edit Note</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>Edit Note</h1>

<form method="POST">

    <label>Title</label><br>

    <input
    type="text"
    name="title"
    value="{{ note.title }}"
    required>

    <br><br>

    <label>Content</label><br>

    <textarea
    name="content"
    rows="8"
    cols="50"
    required>{{ note.content }}</textarea>

    <br><br>

    <button type="submit">
        Save Changes
    </button>

</form>

<br>

<a href="/">
    <button>
        Back
    </button>
</a>

</body>

</html>

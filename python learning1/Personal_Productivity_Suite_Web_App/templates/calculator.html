<!DOCTYPE html>

<html>

<head>

<title>
Calculator
</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<h1>
CALCULATOR TOOL
</h1>


<form method="POST">


<input 
type="number"
step="any"
name="num1"
placeholder="First Number"
required>


<br>


<input 
type="number"
step="any"
name="num2"
placeholder="Second Number"
required>


<br>


<select name="operation">

<option value="add">
Add
</option>

<option value="subtract">
Subtract
</option>

<option value="multiply">
Multiply
</option>

<option value="divide">
Divide
</option>

</select>


<br>


<button type="submit">
Calculate
</button>


</form>



{% if result != None %}

<h2>
Result: {{ result }}
</h2>

{% endif %}



<a href="/">
Back to Home
</a>


</body>

</html>
